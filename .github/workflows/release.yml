name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tags starting with 'v'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (For Build Tools)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download and Extract JetBrains Runtime (macOS)
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            JBR_URL="https://cache-redirector.jetbrains.com/intellij-jbr/jbr_jcef-21.0.2-osx-aarch64-b375.1.tar.gz"
          else
            JBR_URL="https://cache-redirector.jetbrains.com/intellij-jbr/jbr_jcef-21.0.2-osx-x64-b375.1.tar.gz"
          fi
          curl -L -o jbr.tar.gz "$JBR_URL"
          mkdir jbr
          tar -xzf jbr.tar.gz -C jbr --strip-components=1
          echo "JBR_HOME=$PWD/jbr/Contents/Home" >> $GITHUB_ENV

      - name: Build macOS DMG
        run: ./gradlew packageReleaseDmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: '**/build/compose/binaries/main-release/dmg/*.dmg'
          retention-days: 1

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (For Build Tools)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download and Extract JetBrains Runtime (Windows)
        shell: pwsh
        run: |
          $JBR_URL="https://cache-redirector.jetbrains.com/intellij-jbr/jbr_jcef-21.0.2-windows-x64-b375.1.tar.gz"
          Invoke-WebRequest -Uri $JBR_URL -OutFile jbr.tar.gz
          mkdir jbr
          tar -xzf jbr.tar.gz -C jbr --strip-components=1
          $jbrHome = (Resolve-Path "jbr").Path
          Add-Content -Path $env:GITHUB_ENV -Value "JBR_HOME=$jbrHome"

      - name: Build Windows Installer
        run: ./gradlew packageReleaseMsi

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: '**/build/compose/binaries/main-release/msi/*.msi'
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [ build-macos, build-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release-artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}